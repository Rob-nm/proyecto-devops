<!DOCTYPE html>
<html>
<head>
    <title>Crypto Tracker</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-dark text-white p-5">
    <div class="container text-center">
        <h1>🚀 Crypto Tracker Real-Time</h1>
        <div class="card bg-secondary mt-4">
            <div class="card-body">
                <h2 id="precio">Cargando...</h2>
                <button class="btn btn-primary" onclick="actualizar()">Actualizar Precio</button>
            </div>
        </div>
    </div>
    <script>
        function actualizar() {
            fetch('http://' + window.location.hostname + ':8080/precio')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('precio').innerText = data.moneda + ": $" + data.precio;
                });
        }
    </script>
</body>
</html>
